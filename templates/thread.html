 margin: 30px;

<body>

<a href="/" class="am" id="top">вҶҗ гӮ№гғ¬гғғгғүдёҖиҰ§гҒ«жҲ»гӮӢ</a>
<h1>{{ thread[1] }}</h1>
<p>зҙҜиЁҲгҒ®иЎЁзӨәеӣһж•°: <span id="onlineCount">0</span> еӣһ</p>

<ul id="posts">
  {% for post in posts %}
<div class="akys">
  <li class="post-container">
<div class="color-box" id="{{ post.num }}">
      {{ post.num }} <b>{{ post.name | safe }}</b>
      <div class="htn">{{ post.message | imgify }}</div>
      <span>({{ post.created_at }})</span> <!-- гҒ“гҒ“гӮ’дҝ®жӯЈ -->
    </div>


  </li>
<br>
<img src="{{ post.icon_url if post.icon_url else '/static/default_icon.png' }}" class="user-icon" style="margin-top: -30px; margin-left: 50px;">
</div>
  {% endfor %}
</ul>

<div class="kakiko">
  <form id="postForm" enctype="multipart/form-data">
    еҗҚеүҚ: <input type="text" name="name"><br>
    
    <!-- гӮўгӮӨгӮігғіиЁӯе®ҡ -->
    гӮўгӮӨгӮігғіиЁӯе®ҡ: <input type="file" id="iconInput" accept="image/*">
    <input type="hidden" name="icon_url" id="uploadedIconUrl" value="">
    <br>

    жң¬ж–Ү: <textarea name="message" id="messageArea"></textarea><br>

    з”»еғҸгҒ®жҠ•зЁҝ: <input type="file" id="fileInput" accept="image/*">
    <div id="result"></div>

    AAгҒ®жҠ•зЁҝ
    <div>
        <select id="mySelect">
            <option value="">AAгӮ’йҒёжҠһ</option>
            <option value="option1">з”»еғҸгӮӮиІјгӮүгҒҡгҒ«гӮ№гғ¬з«ӢгҒҰгҒЁгҒӘпјҹ</option>
            <option value="option2">дёҚеҝ«гҒӘгӮ№гғ¬гӮ’з«ӢгҒҰгӮӢгҒӘгҒ§гҒҷгҒ…</option>
            <option value="option3">еӨүж…ӢгҒ пјҒ</option>
            <option value="option4">(жҖҜгҒҲгӮӢ)</option>
            <option value="option5">гҒ•гҒҒгҒҠеүҚгҒ®зҪӘгӮ’ж•°гҒҲгӮҚ</option>
        </select>
    </div>
        <button type="button" onclick="checkValues()">AAгӮ’жұәе®ҡ</button>
    <button type="submit">жҠ•зЁҝгҒҷгӮӢ</button>
  </form>
</div>

<a href="#top"><img src="/static/pagetop.png" height="80" id="fixed"></a>

<!-- 1. еӨ–йғЁгғ©гӮӨгғ–гғ©гғӘгӮ’е…ҲгҒ«иӘӯгҒҝиҫјгӮҖ -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- 2. гғЎгӮӨгғігҒ®гғӯгӮёгғғгӮҜ -->
<script>




// socketгҒ®е®ҡзҫ©гӮ’дёҖз•ӘдёҠгҒ«жҢҒгҒЈгҒҰгҒҸгӮӢ
const threadId = {{ thread_id }};
const postsList = document.getElementById("posts");
const socket = io({ transports: ["websocket"] });

// --- й–ўж•°е®ҡзҫ© ---
function generatePastelColor() {
    const hue = Math.floor(Math.random() * 360);
    return `hsl(${hue}, 80%, 85%)`;
}

function safeNl2br(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

function convertImageUrls(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/gi;
    return text.replace(urlRegex, (url) => {
        if (url.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            return `<br><a href="${url}" target="_blank"><img src="${url}" style="max-width:200px; display:block;"></a>`;
        }
        return `<a href="${url}" target="_blank">${url}</a>`;
    });
}

function convertAnchors(text) {
    return text.replace(/&gt;&gt;(\d+)/g, '<span class="anchor" data-target="$1">&gt;&gt;$1</span>');
}

function applyRandomColor(element) {
    const newColor = generatePastelColor();
    // иғҢжҷҜиүІгҒЁгҒ—гҒЈгҒҪ(before)гҒ®дёЎж–№гҒ«йҒ©з”ЁгҒ•гӮҢгӮӢгӮҲгҒҶCSSеӨүж•°гӮ’дҪҝгҒҶ
    element.style.setProperty('--box-color', newColor);
    // еҝөгҒ®гҒҹгӮҒзӣҙжҺҘгҒ®иғҢжҷҜиүІгӮӮгӮ»гғғгғҲгҒ—гҒҰгҒҠгҒҸ
    element.style.backgroundColor = newColor;
}

function addPostToDOM(post) {
    const li = document.createElement("li");
    li.className = "post-container";
    const iconSrc = post.icon_url || "/static/default_icon.png";
    let msg = convertAnchors(convertImageUrls(safeNl2br(post.message)));

    li.innerHTML = `
      <div class="color-box" id="${post.num}">
        ${post.num} <b>${post.name}</b>
        <div class="htn">${msg}</div>
        <span>(${post.created_at})</span>
      </div>
      <img src="${iconSrc}" class="user-icon">
    `;
    postsList.appendChild(li);
    
    const box = li.querySelector('.color-box');
    if (box) applyRandomColor(box);
}

// --- еҲқжңҹе®ҹиЎҢ ---
// ж—ўеӯҳгҒ®жҠ•зЁҝгҒҷгҒ№гҒҰгҒ«иүІгӮ’еЎ—гӮӢ
document.querySelectorAll('.color-box').forEach(box => {
    applyRandomColor(box);
});

// --- гӮӨгғҷгғігғҲгғӘгӮ№гғҠгғј ---

// гӮўгӮӨгӮігғігӮўгғғгғ—гғӯгғјгғү
document.getElementById("iconInput").addEventListener("change", async function() {
    const file = this.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("imageFile", file);
    const res = await fetch("/upload", { method: "POST", body: formData });
    const data = await res.json();
    if (data.url) {
        document.getElementById("uploadedIconUrl").value = data.url;
        alert("гӮўгӮӨгӮігғігӮ’гӮ»гғғгғҲгҒ—гҒҫгҒ—гҒҹ");
    }
});

// жң¬ж–Үз”Ёз”»еғҸгӮўгғғгғ—гғӯгғјгғү
document.getElementById("fileInput").addEventListener("change", async function() {
    const file = this.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("imageFile", file);
    const res = await fetch("/upload", { method: "POST", body: formData });
    const data = await res.json();
    if (data.url) {
        document.getElementById("messageArea").value += "\n" + data.url;
    }
});

// жҠ•зЁҝгғ•гӮ©гғјгғ йҖҒдҝЎ
document.getElementById("postForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch(`/thread/${threadId}/add_post`, { method: "POST", body: formData });
    if (res.ok) { 
        e.target.reset(); 
        document.getElementById("uploadedIconUrl").value = ""; 
    }
});

// Socket.io йҖҡдҝЎ
socket.on("connect", () => socket.emit("join_thread", { thread_id: threadId }));
socket.on("new_post", (post) => addPostToDOM(post));
socket.on("online_count", (count) => {
    const el = document.getElementById("onlineCount");
    if (el) el.textContent = count;
});












function checkValues() {
    



    const selectElement = document.getElementById("mySelect");
    const selectedValue = selectElement.value;
    if (selectedValue === "option1") {
        const textarea = document.getElementById("messageArea");
        textarea.value += "\n" + "." + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ |:;:;:;:;:;:;:;:;:;:;:;:;:;:i;:;:;:;:;:;:;:;:;:;:;:;:;|" + "\n" + "гҖҖ гҖҖ гҖҖ гҖҖ гҖҖ |;:;:_:;:_:;:_:;:_;:;_:;:l:;_;:_:;:_:;:_:;:_;:_;|" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ|пјҝпјҝпјҝпјҝпјҝ_|пјҝпјҝпјҝпјҝпјҝ|" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ|гҖҖдёү|гҖҖгҖҖпјҝ гҖҖ гҖҖ пјҝгҖҖгҖҖ |дёү !" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ|гҖҖдёү|гҖҖ дёүпҪјгҖҖгҖҖгҖҖгғҫдёүгҖҖ |дёү |" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ|гҖҖдёүвҖІгҖҖ .._гҖҖгҖҖгҖҖгҖҖ _,,..гҖҖ iдёү |" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгғҲпҪӨпҫҶ|гҖҖ<гҒ§iпҫқгғҪгҖҖ ;'iпҪЁгҒ§iпҫқ |дёү.|" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ', iгғҪ!гҖҖ пҪӨгҖҖвҖҗ' /гҖҖ !пҪӨгҖҖгғјгӮ· |пҪј,пҪІ" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ i,гғҪпҫҳгҖҖгҖҖгҖҖгҖҖ,' :гҖҖ !.гҖҖгҖҖгҖҖгҖҖ |пҪҶ пҫү" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгғҫ!гҖҖгҖҖгҖҖгҖҖi ,пҪӨгҖҖ,..пҪӨгғҪгҖҖгҖҖгҖҖlгғҺ" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ|гҖҖгҖҖгҖҖгҖҖгҖҖ _гҖҖ_гҖҖгҖҖгҖҖ пҪІ l гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖз”»еғҸгӮӮејөгӮүгҒҡгҒ«гӮ№гғ¬з«ӢгҒҰгҒЁгҒӘпјҹ" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ гҖҖ гҖҖ lгҖҖгҖҖгҖҖ ,пҪЁпҫҒвҖҗ-вҖҗгғҪгҖҖгҖҖi /гҖҒ" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖ гҖҖ гҖҖ гҖҖ пҫһiпҪӨгҖҖгҖҖ гӮқпҪӨдәҢпҫҢвҖІ пҫү/'пјј" + "\n" + "гҖҖгҖҖгҖҖгҖҖ гҖҖ гҖҖ гҖҖ гҖҖ | пјјгҖҖгҖҖпҪ°дёҖ пјҸ /гҖҖгҖҖ _,пҫқ'пҫһпјј" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖгҖҖ,гӮЈ|пҪӨгҖҖ пјјгҖҖгҖҖгҖҖгҖҖ /_,пҪӨ-' _,.-''Вҙ пҪҖдё¶пҪӨпјҝ_" + "\n" + "гҖҖгҖҖгҖҖгҖҖгҖҖ пјҝ, гӮӨгҖҖ | гғҪпјҝ дәҢпјқ''гҖҖ_,. -''ВҙгҖҖгҖҖ''''''ВҙВҙгҖҖ пҪҖ`пҪ°";
